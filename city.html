<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#05070d">
  <title>Neon District</title>
  <link rel="stylesheet" href="city.css">
</head>
<body>
  <main class="city-shell">
    <div class="city-media" aria-hidden="true">
      <video id="cityVideoA" class="city-video active" muted loop playsinline autoplay preload="auto"></video>
      <video id="cityVideoB" class="city-video" muted loop playsinline autoplay preload="auto"></video>
      <div class="city-shade"></div>
      <div class="scanlines"></div>
    </div>

    <header class="top-hud">
      <a class="back-link" href="index.html">PIPE GRID</a>
      <div class="sector-readout">
        <span>SECTOR</span>
        <strong id="stageNumber">01</strong>
      </div>
    </header>

    <section class="city-title" aria-live="polite">
      <p id="stageCode">GRID // OFFLINE</p>
      <h1 id="stageName">DARK ZONE</h1>
    </section>

    <section class="progress-dock" aria-label="도시 성장 진행도">
      <div class="progress-copy">
        <span id="progressLabel">ENERGY 00 / 50</span>
        <strong id="totalCount">000</strong>
      </div>
      <div
        id="progressTrack"
        class="progress-track"
        role="progressbar"
        aria-valuemin="0"
        aria-valuemax="50"
        aria-valuenow="0"
      >
        <span id="progressFill" class="progress-fill"></span>
        <span class="progress-ticks" aria-hidden="true"></span>
      </div>
      <div class="progress-meta">
        <span>NETWORK ENERGY</span>
        <span id="nextStage">NEXT // 050</span>
      </div>
    </section>
  </main>

  <script src="config.js?v=2"></script>
  <script src="progress-store.js?v=3"></script>
  <script src="city.js?v=2"></script>
</body>
</html>
